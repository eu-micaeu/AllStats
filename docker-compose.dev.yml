services:
  backend:
    build:
      context: ./backend/go
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend/go:/app
      - /app/tmp
    environment:
      - PORT=8080
      - GIN_MODE=debug
      - MONGO_URI=mongodb://mongodb:27017/allstats
    depends_on:
      - mongodb
    networks:
      - allstats-network
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend/react
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/react:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - allstats-network
    environment:
      - VITE_API_URL=/api
      - API_TARGET=http://backend:8080
    stdin_open: true
    tty: true

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - allstats-network

volumes:
  mongodb_data:

networks:
  allstats-network:
    driver: bridge